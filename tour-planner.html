    // ===== Layout A: Tabs =====
    function renderLayoutA() {
      const active = state.days.find(d => d.id === state.activeDayId) || state.days[0];
      const tabs = state.days.map((d, i) => {
        const dateStr = getDayDate(i);
        const label = dateStr ? `${escHtml(d.label)} ${escHtml(dateStr)}` : escHtml(d.label);
        return `
          <button class="day-tab ${d.id === active?.id ? 'active' : ''}"
            data-action="select-day" data-day-id="${d.id}">${label}</button>
        `;
      }).join('');
      return `
        <div class="day-tabs">
          ${tabs}
          <button class="day-tab-add" data-action="add-day" title="新增天數">＋</button>
        </div>
        <div class="day-content">
          <div class="day-switch-wrap" style="display:none">
            ${shareState.dayDropdownOpen ? renderDayDropdown(active) : ''}
          </div>
          ${active ? renderDayHeader(active) + renderDaySpots(active) : ''}
        </div>`;
    }

    // ===== Layout B: Sidebar =====
    function renderLayoutB() {
      const active = state.days.find(d => d.id === state.activeDayId) || state.days[0];
      const items = state.days.map((d, i) => {
        const dateStr = getDayDate(i);
        const isoDate = getDayIsoDate(i);
        const wCache  = isoDate && state.settings.weatherCity && state.settings.weatherGeo
          ? getCachedForecast(state.settings.weatherCity, isoDate)
          : undefined;
        const wSnippet = (wCache && wCache !== null)
          ? ` <span style="font-size:10px;opacity:0.85">${wmoToEmoji(wCache.weathercode)} ${wCache.tempMax}°</span>`
          : '';
        return `
          <button class="sidebar-day-btn ${d.id === active?.id ? 'active' : ''}"
            data-action="select-day" data-day-id="${d.id}"
            style="${dateStr ? 'white-space:normal;line-height:1.4' : ''}">${escHtml(d.label)}${dateStr ? `<span style="display:block;font-size:10px;opacity:0.7">${escHtml(dateStr)}${wSnippet}</span>` : ''}</button>
        `;
      }).join('');
      return `
        <div class="layout-b-wrap">
          <div class="day-sidebar">
            ${items}
            <button class="sidebar-day-add" data-action="add-day">＋ 新增天</button>
          </div>
          <div class="day-content">
            <div class="day-switch-wrap">
              <button class="day-switch-btn" data-action="toggle-day-dropdown">
                ${escHtml(active?.label || '天數')} ▾
              </button>
              ${shareState.dayDropdownOpen ? renderDayDropdown(active) : ''}
            </div>
            ${active ? renderDayHeader(active) + renderDaySpots(active) : ''}
          </div>
        </div>`;
    }

    // ===== Layout B mobile day dropdown =====
    function renderDayDropdown(activeDay) {
      const items = state.days.map((d, i) => {
        const dateStr = getDayDate(i);
        return `<button class="day-dropdown-item ${d.id === activeDay?.id ? 'active' : ''}"
          data-action="select-day" data-day-id="${d.id}">
          <span>${escHtml(d.label)}</span>
          ${dateStr ? `<span class="day-dropdown-date">${escHtml(dateStr)}</span>` : ''}
        </button>`;
      }).join('');
      return `
        <div class="day-dropdown-backdrop" data-action="close-day-dropdown"></div>
        <div class="day-dropdown-menu">
          ${items}
          <button class="day-dropdown-add" data-action="add-day">＋ 新增天數</button>
        </div>`;
    }

    // ===== Layout C: Vertical Scroll =====
    function renderLayoutC() {
      const sections = state.days.map((day, i) => {
        const dateStr     = getDayDate(i);
        const isoDate     = getDayIsoDate(i);
        const weatherHtml = isoDate ? renderWeatherBadge(i, isoDate) : '';
        return `
          <div class="day-section">
            <div class="day-section-header">
              <span style="color:var(--accent)">📅</span>
              <input class="day-name-input" value="${escHtml(day.label)}"
                data-action="day-name" data-day-id="${day.id}">
              ${dateStr ? `<span style="font-size:12px;color:var(--text-muted)">${escHtml(dateStr)}</span>` : ''}
              ${weatherHtml}
              <button class="btn-ghost" data-action="copy-day"
                data-day-id="${day.id}" title="複製此天">⎘</button>
              ${renderDeleteDayBtn(day)}
            </div>
            ${renderDaySpots(day)}
          </div>
        `;
      }).join('');
      return `
        <div class="layout-c-wrap">
          ${sections}
          <button class="btn-add" style="max-width:260px" data-action="add-day">＋ 新增天數</button>
        </div>`;
    }

    // ===== Trips Overlay =====
    function renderTripsOverlay() {
      if (!tripsOpen) return '';
      const items = tripList.map((t, i) => `
        <div class="trip-list-item">
          <button class="trip-list-btn ${i === activeTripIdx ? 'active' : ''}"
            data-action="switch-trip" data-idx="${i}">${escHtml(t.tripName)}</button>
          ${tripList.length > 1
            ? `<button class="btn-ghost" data-action="delete-trip" data-idx="${i}" title="刪除此行程">🗑</button>`
            : ''}
        </div>
      `).join('');
      return `
        <div class="trips-overlay open" id="trips-overlay">
          <div class="trips-backdrop" data-action="close-trips"></div>
          <div class="trips-panel">
            <div class="trips-panel-title">📋 行程管理</div>
            ${items}
            <button class="btn-add" data-action="new-trip-in-list" style="margin-top:10px">＋ 新增行程</button>
          </div>
        </div>`;
    }

    // ===== Render =====
    function renderMobileBottomBar() {
      const active = state.days.find(d => d.id === state.activeDayId) || state.days[0];
      const dayId = active?.id || (state.days[state.days.length - 1]?.id) || '';
      return `
        <div class="mobile-bottom-bar">
          <button class="mbb-btn" data-action="add-spot" data-day-id="${dayId}">
            <span class="mbb-icon">＋</span>
            <span class="mbb-label">景點</span>
          </button>
          <button class="mbb-btn" data-action="add-day">
            <span class="mbb-icon">📅</span>
            <span class="mbb-label">新增天</span>
          </button>
        </div>`;
    }

    function render() {
      const scrollY = window.scrollY;
      applySettings(state.settings);
      const { layout } = state.settings;
      const mainContent = layout === 'B' ? renderLayoutB()
        : layout === 'C' ? renderLayoutC()
        : renderLayoutA();
      document.getElementById('app').innerHTML = `
        ${renderPrintHeader()}
        ${renderHeader()}
        ${renderSettingsPanel()}
        <main id="main-area" style="flex:1;display:flex;flex-direction:column">
          ${mainContent}
        </main>
        ${renderShareOverlay()}
        ${renderHelpOverlay()}
        ${renderTripsOverlay()}
        ${renderMobileBottomBar()}`;
      window.scrollTo(0, scrollY);
      setTimeout(fetchWeatherIfNeeded, 0);
    }

    function init() {
      render();
      attachEvents();
      if (FIREBASE_CONFIG.projectId) migrateExistingTrips().catch(() => {});
      handleImportParam();
    }

    function addSpotAndFocus(dayId) {
      setState(s => {
        const day = s.days.find(d => d.id === dayId);
        if (day) day.spots.push({ id: genId(), name: '', stayDuration: 0, notes: '', category: null });
      });
      requestAnimationFrame(() => {
        const cards = document.querySelectorAll(`.spot-card[data-day-id="${dayId}"]`);
        const last = cards[cards.length - 1];
        last?.querySelector('.spot-name')?.focus();
      });
    }

    function attachEvents() {
      const app = document.getElementById('app');

      // --- Click ---
      app.addEventListener('click', e => {
        const el     = e.target.closest('[data-action]');
        const action = el?.dataset.action;
        if (!action) return;

        if (action === 'open-share') {
          setShareState({
            open: true, loading: true, list: [], error: null, dialog: null,
            shareTab: 'public', privateCodeQueried: null,
          });
          loadPublicTrips();
          return;
        }
        if (action === 'close-share') {
          setShareState({ open: false, dialog: null, deleteError: null, uploadError: null, shareUrl: null, managingTrip: null, manageError: null });
          return;
        }
        if (action === 'copy-share-url') {
          navigator.clipboard.writeText(el.dataset.url)
            .then(() => { el.textContent = '✅ 已複製'; })
            .catch(() => alert('複製失敗，請手動複製'));
          return;
        }
        if (action === 'copy-trip-link') {
          const url = `${location.origin}${location.pathname}?import=${encodeURIComponent(el.dataset.tripId)}`;
          navigator.clipboard.writeText(url)
            .then(() => {
              const orig = el.textContent;
              el.textContent = '✅';
              setTimeout(() => { el.textContent = orig; }, 1500);
            })
            .catch(() => alert('複製失敗，請手動複製'));
          return;
        }
        if (action === 'switch-share-tab') {
          const tab = el.dataset.tab;
          if (tab === shareState.shareTab) return;
          if (tab === 'public') {
            setShareState({ shareTab: 'public', loading: true, list: [], error: null });
            loadPublicTrips();
          } else if (isSuperUser()) {
            setShareState({ shareTab: 'private', loading: true, list: [], error: null, privateCodeQueried: null });
            loadAllPrivateTrips();
          } else {
            setShareState({ shareTab: 'private', loading: false, list: [], error: null, privateCodeQueried: null });
          }
          return;
        }
        if (action === 'query-private-trips') {
          const code = document.getElementById('private-code-input')?.value?.trim();
          if (!code) { setShareState({ error: '請輸入暗號' }); return; }
          setShareState({ loading: true, list: [], error: null });
          loadPrivateTrips(code);
          return;
        }
        if (action === 'open-upload-dialog') {
          setShareState({
            dialog: 'upload',
            uploadVisibility: 'public',
            uploadSecretCode: '',
            uploadError: null,
          });
          return;
        }
        if (action === 'open-upload-dialog-private') {
          const code = document.getElementById('private-code-input')?.value?.trim();
          setShareState({
            dialog: 'upload',
            uploadVisibility: 'private',
            uploadSecretCode: code ?? '',
            uploadError: null,
          });
          return;
        }
        if (action === 'set-upload-visibility') {
          if (!['public', 'private'].includes(el.dataset.val)) return;
          setShareState({ uploadVisibility: el.dataset.val, uploadError: null });
          return;
        }
        if (action === 'close-share-dialog') {
          setShareState({
            dialog: null, deleteError: null, uploadError: null,
            updateError: null, overwriteTargetId: null, overwriteTargetName: null,
            overwriteUpdateName: true, uploadVisibility: 'public', uploadSecretCode: '',
            managingTrip: null, manageError: null,
          });
          return;
        }
        if (action === 'open-trips') { tripsOpen = true; render(); return; }
        if (action === 'close-trips') { tripsOpen = false; render(); return; }
        if (action === 'switch-trip') {
          const idx = parseInt(el.dataset.idx);
          if (idx === activeTripIdx) { tripsOpen = false; render(); return; }
          activeTripIdx = idx;
          state = tripList[activeTripIdx];
          tripsOpen = false;
          render();
          return;
        }
        if (action === 'delete-trip') {
          const idx = parseInt(el.dataset.idx);
          if (tripList.length <= 1) return;
          if (!confirm('確定刪除此行程？')) return;
          tripList.splice(idx, 1);
          if (activeTripIdx >= tripList.length) activeTripIdx = tripList.length - 1;
          state = tripList[activeTripIdx];
          save();
          render();
          return;
        }
        if (action === 'new-trip-in-list') {
          const newTrip = defaultState();
          newTrip.settings = { ...state.settings };
          tripList.push(newTrip);
          activeTripIdx = tripList.length - 1;
          state = tripList[activeTripIdx];
          save();
          tripsOpen = false;
          render();
          return;
        }
        if (action === 'confirm-upload') {
          const pw = document.getElementById('share-upload-pw')?.value?.trim();
          if (!pw) { setShareState({ uploadError: '請輸入刪除密碼' }); return; }
          const vis = shareState.uploadVisibility;
          const code = document.getElementById('share-upload-code')?.value?.trim() || shareState.uploadSecretCode.trim();
          if (vis === 'private' && !code) { setShareState({ uploadError: '請輸入暗號' }); return; }
          uploadTripToCloud(pw, vis, code)
            .then(docId => {
              const shareUrl = `${location.origin}${location.pathname}?import=${docId}`;
              setShareState({ dialog: null, uploadError: null, shareUrl, loading: true, list: [] });
              return shareState.shareTab === 'public' ? loadPublicTrips()
                : shareState.privateCodeQueried === '__SUPERUSER__' ? loadAllPrivateTrips()
                : loadPrivateTrips(shareState.privateCodeQueried || code);
            })
            .catch(err => setShareState({ uploadError: err.message || '上傳失敗' }));
          return;
        }
        if (action === 'import-shared-trip') {
          const docId = el.dataset.tripId;
          if (!confirm('匯入將覆蓋目前行程，確定嗎？')) return;
          getSharedTripData(docId)
            .then(data => {
              setActiveTrip(migrateState(data));
              if (!state.days?.find(d => d.id === state.activeDayId)) {
                state.activeDayId = state.days?.[0]?.id ?? null;
              }
              save();
              saveImportedDocId(docId);
              setShareState({ open: false, dialog: null, importedDocId: docId });
            })
            .catch(err => alert('匯入失敗：' + (err.message || '未知錯誤')));
          return;
        }
        if (action === 'open-overwrite-dialog') {
          setShareState({
            dialog: 'overwrite',
            overwriteTargetId: el.dataset.tripId,
            overwriteTargetName: el.dataset.tripName,
            overwriteUpdateName: true,
            updateError: null,
          });
          return;
        }
        if (action === 'toggle-overwrite-name') {
          setShareState({ overwriteUpdateName: !shareState.overwriteUpdateName });
          return;
        }
        if (action === 'set-overwrite-update-name') {
          setShareState({ overwriteUpdateName: el.dataset.value === 'true' });
          return;
        }
        if (action === 'confirm-overwrite') {
          const docId = el.dataset.tripId;
          const pw = document.getElementById('share-update-pw')?.value?.trim();
          if (!pw) { setShareState({ updateError: '請輸入密碼' }); return; }
          const nameToSave = shareState.overwriteUpdateName
            ? state.tripName
            : shareState.overwriteTargetName;
          updateTripInCloud(docId, pw, nameToSave)
            .then(() => {
              setShareState({ dialog: null, updateError: null, loading: true, list: [] });
              return shareState.shareTab === 'public'
                ? loadPublicTrips()
                : shareState.privateCodeQueried === '__SUPERUSER__'
                  ? loadAllPrivateTrips()
                  : loadPrivateTrips(shareState.privateCodeQueried);
            })
            .catch(err => setShareState({ updateError: err.message || '覆蓋失敗' }));
          return;
        }
        if (action === 'open-manage-dialog') {
          setShareState({ dialog: 'manage', managingTrip: { id: el.dataset.tripId, tripName: el.dataset.tripName }, manageView: 'main', manageError: null });
          return;
        }
        if (action === 'manage-change-pw-view') {
          setShareState({ manageView: 'changePassword', manageError: null });
          return;
        }
        if (action === 'manage-back') {
          setShareState({ manageView: 'main', manageError: null });
          return;
        }
        if (action === 'manage-delete') {
          setShareState({ dialog: 'delete', deleteTargetId: shareState.managingTrip.id, deleteError: null, managingTrip: null });
          return;
        }
        if (action === 'manage-change-pw-submit') {
          const docId = el.dataset.tripId;
          const oldPw = document.getElementById('manage-old-pw')?.value?.trim();
          const newPw = document.getElementById('manage-new-pw')?.value?.trim();
          if (!oldPw || !newPw) { setShareState({ manageError: '請輸入舊密碼與新密碼' }); return; }
          changeTripPassword(docId, oldPw, newPw)
            .then(() => setShareState({ dialog: null, managingTrip: null, manageError: null }))
            .catch(err => setShareState({ manageError: err.message || '更換失敗' }));
          return;
        }
        if (action === 'open-delete-dialog') {
          setShareState({ dialog: 'delete', deleteTargetId: el.dataset.tripId, deleteError: null });
          return;
        }
        if (action === 'confirm-delete') {
          const docId = el.dataset.tripId;
          const pw = document.getElementById('share-delete-pw')?.value?.trim();
          if (!pw && !isSuperUser()) { setShareState({ deleteError: '請輸入密碼' }); return; }
          const reloadAfterDelete = () => {
            if (shareState.importedDocId === docId) {
              saveImportedDocId(null);
              shareState.importedDocId = null;
            }
            setShareState({ dialog: null, deleteError: null, loading: true, list: [] });
            return shareState.shareTab === 'public'
              ? loadPublicTrips()
              : shareState.privateCodeQueried === '__SUPERUSER__'
                ? loadAllPrivateTrips()
                : loadPrivateTrips(shareState.privateCodeQueried);
          };
          const deletePromise = (!pw && isSuperUser())
            ? deleteSharedTripAsAdmin(docId)
            : deleteSharedTrip(docId, pw);
          deletePromise.then(reloadAfterDelete)
            .catch(err => setShareState({ deleteError: err.message || '刪除失敗' }));
          return;
        }

        if (action === 'open-help')        { helpOpen = true;  render(); return; }
        if (action === 'close-help')       { helpOpen = false; superUserPromptOpen = false; render(); return; }

        if (action === 'toggle-superuser-prompt') {
          if (isSuperUser()) {
            localStorage.removeItem('travel-planner-superuser');
            superUserPromptOpen = false;
          } else {
            superUserPromptOpen = !superUserPromptOpen;
            if (superUserPromptOpen) setTimeout(() => document.getElementById('su-pw-input')?.focus(), 50);
          }
          render(); return;
        }
        if (action === 'submit-superuser-pw') {
          const input = document.getElementById('su-pw-input');
          if (input && input.value === '6666') {
            localStorage.setItem('travel-planner-superuser', '1');
            superUserPromptOpen = false;
            render();
          } else if (input) {
            input.style.borderColor = '#f87171';
            input.value = '';
            setTimeout(() => { input.style.borderColor = ''; }, 800);
          }
          return;
        }

        if (action === 'undo') { undo(); return; }
        if (action === 'redo') { redo(); return; }
        if (action === 'toggle-settings') { settingsOpen = !settingsOpen; render(); return; }
        if (action === 'close-settings')  { settingsOpen = false; render(); return; }
        if (action === 'toggle-local-menu') { localMenuOpen = !localMenuOpen; render(); return; }
        if (action === 'close-local-menu')  { localMenuOpen = false; render(); return; }
        if (action === 'export-json')     { localMenuOpen = false; exportJSON(); return; }
        if (action === 'print-trip')      { localMenuOpen = false; render(); window.print(); return; }
        if (action === 'export-ics')      { localMenuOpen = false; render(); exportICS(); return; }

        if (action === 'setting') {
          const SETTING_KEYS = ['layout', 'theme', 'defaultTransport', 'fontSize'];
          if (!SETTING_KEYS.includes(el.dataset.key)) return;
          setState(s => { s.settings[el.dataset.key] = el.dataset.val; }, { recordHistory: false });
          return;
        }

        if (action === 'confirm-weather-city') {
          const cityInput = document.querySelector('[data-action="weather-city-input"]');
          const city = (cityInput?.value || state.settings.weatherCity || '').trim();
          if (!city) return;
          weatherGeoLoading = true;
          weatherGeoError   = '';
          render();
          geocodeCity(city).then(geo => {
            weatherGeoLoading = false;
            if (!geo) {
              weatherGeoError = '找不到城市，請確認拼寫';
              render();
            } else {
              weatherGeoError = '';
              setState(s => { s.settings.weatherCity = city; s.settings.weatherGeo = geo; }, { recordHistory: false });
            }
          }).catch(() => {
            weatherGeoLoading = false;
            weatherGeoError = '無法查詢城市，請稍後再試';
            render();
          });
          return;
        }

        if (action === 'toggle-day-dropdown') {
          setShareState({ dayDropdownOpen: !shareState.dayDropdownOpen });
          return;
        }

        if (action === 'close-day-dropdown') {
          setShareState({ dayDropdownOpen: false });
          return;
        }

        if (action === 'add-day') {
          setState(s => {
            const d = makeDay(s.days.length + 1);
            s.days.push(d);
            s.activeDayId = d.id;
          });
          if (shareState.dayDropdownOpen) setShareState({ dayDropdownOpen: false });
          return;
        }

        if (action === 'select-day') {
          const container = el.closest('[data-day-id]');
          if (!container) return;
          setState(s => { s.activeDayId = container.dataset.dayId; }, { recordHistory: false });
          if (shareState.dayDropdownOpen) setShareState({ dayDropdownOpen: false });
          return;
        }

        if (action === 'delete-day') {
          const dayId = el.dataset.dayId;
          if (!confirm('確定刪除這一天？')) return;
          setState(s => { s.days = s.days.filter(d => d.id !== dayId); });
          return;
        }

        if (action === 'add-spot') {
          const dayId = el.dataset.dayId;
          if (!dayId) return;
          addSpotAndFocus(dayId);
          return;
        }

        if (action === 'open-cat-picker') {
          const spotId = el.dataset.spotId;
          setShareState({ catPickerOpenSpotId: shareState.catPickerOpenSpotId === spotId ? null : spotId });
          return;
        }

        if (action === 'close-cat-picker') {
          setShareState({ catPickerOpenSpotId: null });
          return;
        }

        if (action === 'set-cat') {
          const spotId = el.dataset.spotId;
          const catId = el.dataset.cat || null;
          setState(s => {
            for (const day of s.days) {
              const spot = day.spots.find(sp => sp.id === spotId);
              if (spot) { spot.category = catId; break; }
            }
          });
          setShareState({ catPickerOpenSpotId: null });
          return;
        }

        if (action === 'delete-spot') {
          const { spotId, dayId } = el.dataset;
          setState(s => {
            const day = s.days.find(d => d.id === dayId);
            if (!day) return;
            clearRoutesForSpot(s, spotId);
            day.spots = day.spots.filter(sp => sp.id !== spotId);
          });
          return;
        }

        if (action === 'copy-day') {
          copyDay(el.dataset.dayId);
          return;
        }

        if (action === 'toggle-spot-menu') {
          const { spotId } = el.dataset;
          const isOpen = shareState.spotMenuOpen && shareState.spotMenuSpotId === spotId;
          setShareState({ spotMenuOpen: !isOpen, spotMenuSpotId: isOpen ? null : spotId });
          return;
        }

        if (action === 'close-spot-menu') {
          setShareState({ spotMenuOpen: false, spotMenuSpotId: null });
          return;
        }

        if (action === 'move-spot-to-day') {
          const { spotId, fromDayId, toDayId } = el.dataset;
          setShareState({ spotMenuOpen: false, spotMenuSpotId: null });
          moveSpotToDay(spotId, fromDayId, toDayId);
          return;
        }

        if (action === 'copy-spot-to-day') {
          const { spotId, fromDayId, toDayId } = el.dataset;
          setShareState({ spotMenuOpen: false, spotMenuSpotId: null });
          copySpotToDay(spotId, fromDayId, toDayId);
          return;
        }
      });

      app.addEventListener('keydown', e => {
        if (e.key !== 'Enter') return;
        const input = e.target.closest('.spot-name');
        if (!input) return;
        e.preventDefault();
        const dayId = input.dataset.dayId;
        if (!dayId) return;
        addSpotAndFocus(dayId);
      });

      // --- Input (sync without re-render) ---
      app.addEventListener('input', e => {
        const { action } = e.target.dataset;
        if (action === 'private-code-input') {
          shareState.privateCodeInput = e.target.value;
          return;
        }
        if (action === 'upload-secret-code-input') {
          shareState.uploadSecretCode = e.target.value;
          return;
        }
        if (action === 'weather-city-input') {
          state.settings.weatherCity = e.target.value;
          save();
          return;
        }
        // Direct save without re-render (keeps focus/cursor during typing)
        if (action === 'trip-name') { state.tripName = e.target.value; save(); return; }
        if (action === 'day-name') {
          const day = state.days.find(d => d.id === e.target.dataset.dayId);
          if (day) { day.label = e.target.value; save(); }
          return;
        }
        if (action === 'spot-name') {
          const spot = state.days.find(d => d.id === e.target.dataset.dayId)
            ?.spots.find(sp => sp.id === e.target.dataset.spotId);
          if (spot) { spot.name = e.target.value; save(); }
          return;
        }
        if (action === 'spot-notes') {
          const spot = state.days.find(d => d.id === e.target.dataset.dayId)
            ?.spots.find(sp => sp.id === e.target.dataset.spotId);
          if (spot) { spot.notes = e.target.value; save(); }
          return;
        }
        if (action === 'hotel-start-name') {
          const day = state.days.find(d => d.id === e.target.dataset.dayId);
          if (day) { day.startHotelName = e.target.value; save(); }
          return;
        }
        if (action === 'hotel-end-name') {
          const day = state.days.find(d => d.id === e.target.dataset.dayId);
          if (day) { day.endHotelName = e.target.value; save(); }
          return;
        }
      });

      // --- Change ---
      app.addEventListener('change', e => {
        const action = e.target.dataset.action;

        if (action === 'trip-start-date') {
          setState(s => { s.tripStartDate = e.target.value; });
          return;
        }

        if (action === 'import-json' && e.target.files[0]) {
          localMenuOpen = false;
          importJSON(e.target.files[0]);
          return;
        }

        if (action === 'route-transport') {
          const { from, to } = e.target.dataset;
          setState(s => {
            const k = routeKey(from, to);
            if (!s.routes[k]) s.routes[k] = {};
            s.routes[k].transport = e.target.value;
          });
          return;
        }

        if (action === 'spot-dur-h' || action === 'spot-dur-m') {
          const group = e.target.closest('[data-spot-id]');
          if (!group) return;
          const { spotId, dayId } = group.dataset;
          const hSel = group.querySelector('[data-action="spot-dur-h"]');
          const mSel = group.querySelector('[data-action="spot-dur-m"]');
          const totalMins = parseInt(hSel.value) * 60 + parseInt(mSel.value);
          setState(s => {
            const spot = s.days.find(d => d.id === dayId)?.spots.find(sp => sp.id === spotId);
            if (spot) spot.stayDuration = totalMins;
          });
          return;
        }

        if (action === 'route-time-h' || action === 'route-time-m') {
          const group = e.target.closest('[data-from]');
          if (!group) return;
          const { from, to } = group.dataset;
          const hSel = group.querySelector('[data-action="route-time-h"]');
          const mSel = group.querySelector('[data-action="route-time-m"]');
          const totalMins = parseInt(hSel.value) * 60 + parseInt(mSel.value);
          setState(s => {
            const k = routeKey(from, to);
            if (!s.routes[k]) s.routes[k] = {};
            s.routes[k].recordedTime = totalMins;
          });
          return;
        }

      });

      // --- Blur (capture) ---
      app.addEventListener('blur', e => {
        const { action } = e.target.dataset;
        if (!action) return;

        if (action === 'trip-name') {
          setState(s => { s.tripName = e.target.value.trim() || '新旅程'; });
          return;
        }
        if (action === 'day-name') {
          const { dayId } = e.target.dataset;
          setState(s => {
            const day = s.days.find(d => d.id === dayId);
            if (day) day.label = e.target.value.trim() || day.label;
          });
          return;
        }
        if (action === 'hotel-start-name') {
          const { dayId } = e.target.dataset;
          setState(s => {
            const day = s.days.find(d => d.id === dayId);
            if (day) day.startHotelName = e.target.value;
          });
          return;
        }
        if (action === 'hotel-end-name') {
          const { dayId } = e.target.dataset;
          setState(s => {
            const day = s.days.find(d => d.id === dayId);
            if (day) day.endHotelName = e.target.value;
          });
          return;
        }
        if (action === 'spot-name') {
          const { spotId, dayId } = e.target.dataset;
          setState(s => {
            const spot = s.days.find(d => d.id === dayId)?.spots.find(sp => sp.id === spotId);
            if (spot) spot.name = e.target.value;
          });
          return;
        }
        if (action === 'spot-notes') {
          const { spotId, dayId } = e.target.dataset;
          setState(s => {
            const spot = s.days.find(d => d.id === dayId)?.spots.find(sp => sp.id === spotId);
            if (spot) spot.notes = e.target.value;
          });
          return;
        }
        if (action === 'day-start-time') {
          const { dayId } = e.target.dataset;
          setState(s => {
            const day = s.days.find(d => d.id === dayId);
            if (day) day.startTime = e.target.value;
          });
          return;
        }
      }, true);

      // --- Drag and Drop ---
      let dragState = null;

      app.addEventListener('dragstart', e => {
        const card = e.target.closest('.spot-card');
        if (!card) return;
        dragState = { spotId: card.dataset.spotId, fromDayId: card.dataset.dayId };
        card.classList.add('dragging');
        e.dataTransfer.effectAllowed = 'move';
      });

      app.addEventListener('dragend', () => {
        document.querySelectorAll('.dragging, .drag-over, .drag-over-zone')
          .forEach(el => el.classList.remove('dragging', 'drag-over', 'drag-over-zone'));
        dragState = null;
      });

      app.addEventListener('dragover', e => {
        if (!dragState) return;
        const card = e.target.closest('.spot-card');
        const zone = e.target.closest('[data-drop-zone]');
        if (card || zone) {
          e.preventDefault();
          e.dataTransfer.dropEffect = 'move';
          document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
          document.querySelectorAll('.drag-over-zone').forEach(el => el.classList.remove('drag-over-zone'));
          if (card) card.classList.add('drag-over');
          else zone.classList.add('drag-over-zone');
        }
      });

      app.addEventListener('dragleave', e => {
        const card = e.target.closest('.spot-card');
        const zone = e.target.closest('[data-drop-zone]');
        if (card) card.classList.remove('drag-over');
        if (zone) zone.classList.remove('drag-over-zone');
      });

      app.addEventListener('drop', e => {
        if (!dragState) return;
        const card = e.target.closest('.spot-card');
        const zone = e.target.closest('[data-drop-zone]');

        if (card && card.dataset.spotId !== dragState.spotId) {
          e.preventDefault();
          moveSpotBefore(dragState.spotId, dragState.fromDayId, card.dataset.spotId, card.dataset.dayId);
        } else if (zone && !card) {
          e.preventDefault();
          moveSpotToDay(dragState.spotId, dragState.fromDayId, zone.dataset.dayId);
        }
        dragState = null;
      });

      // --- Touch Drag (mobile) ---
      let touchDrag       = null;
      let touchGhost      = null;
      let touchDragTimer  = null;
      let touchStartData  = null;

      app.addEventListener('touchstart', e => {
        const handle = e.target.closest('.drag-handle');
        if (!handle) return;
        const card = handle.closest('.spot-card');
        if (!card) return;
        const touch = e.touches[0];
        const rect  = card.getBoundingClientRect();
        touchStartData = {
          spotId:    card.dataset.spotId,
          fromDayId: card.dataset.dayId,
          offsetX:   touch.clientX - rect.left,
          offsetY:   touch.clientY - rect.top,
          startX:    touch.clientX,
          startY:    touch.clientY,
          card,
          rect
        };
        touchDragTimer = setTimeout(() => {
          if (!touchStartData) return;
          const { card: c, rect: r, offsetX, offsetY, spotId, fromDayId } = touchStartData;
          const t = touchStartData;
          touchDrag = { spotId, fromDayId, offsetX, offsetY };
          touchGhost = c.cloneNode(true);
          touchGhost.style.cssText = `position:fixed;z-index:9999;pointer-events:none;opacity:0.8;` +
            `width:${r.width}px;left:${t.startX - offsetX}px;` +
            `top:${t.startY - offsetY}px;box-shadow:0 8px 24px rgba(0,0,0,0.4);`;
          document.body.appendChild(touchGhost);
          c.classList.add('dragging');
          touchStartData = null;
        }, 200);
      }, { passive: true });

      app.addEventListener('touchmove', e => {
        const touch = e.touches[0];

        if (!touchDrag) {
          if (touchStartData && touchDragTimer) {
            const dx = touch.clientX - touchStartData.startX;
            const dy = touch.clientY - touchStartData.startY;
            if (Math.abs(dx) > 5 || Math.abs(dy) > 5) {
              clearTimeout(touchDragTimer);
              touchDragTimer = null;
              touchStartData = null;
            }
          }
          return;
        }

        if (!touchGhost) return;
        e.preventDefault();

        touchGhost.style.left = (touch.clientX - touchDrag.offsetX) + 'px';
        touchGhost.style.top  = (touch.clientY - touchDrag.offsetY) + 'px';

        touchGhost.style.display = 'none';
        const el = document.elementFromPoint(touch.clientX, touch.clientY);
        touchGhost.style.display = '';

        document.querySelectorAll('.drag-over, .drag-over-zone')
          .forEach(n => n.classList.remove('drag-over', 'drag-over-zone'));
        const overCard = el?.closest('.spot-card');
        const overZone = el?.closest('[data-drop-zone]');
        if (overCard && overCard.dataset.spotId !== touchDrag.spotId) overCard.classList.add('drag-over');
        else if (overZone && !overCard) overZone.classList.add('drag-over-zone');
      }, { passive: false });

      function endTouchDrag(touch) {
        if (touchDragTimer) { clearTimeout(touchDragTimer); touchDragTimer = null; }
        touchStartData = null;

        if (!touchDrag) return;
        if (touchGhost) { touchGhost.remove(); touchGhost = null; }
        document.querySelectorAll('.dragging, .drag-over, .drag-over-zone')
          .forEach(n => n.classList.remove('dragging', 'drag-over', 'drag-over-zone'));

        const el      = document.elementFromPoint(touch.clientX, touch.clientY);
        const overCard = el?.closest('.spot-card');
        const overZone = el?.closest('[data-drop-zone]');
        if (overCard && overCard.dataset.spotId !== touchDrag.spotId) {
          moveSpotBefore(touchDrag.spotId, touchDrag.fromDayId, overCard.dataset.spotId, overCard.dataset.dayId);
        } else if (overZone && !overCard) {
          moveSpotToDay(touchDrag.spotId, touchDrag.fromDayId, overZone.dataset.dayId);
        }
        touchDrag = null;
      }

      app.addEventListener('touchend',    e => endTouchDrag(e.changedTouches[0]));
      app.addEventListener('touchcancel', () => {
        if (touchDragTimer) { clearTimeout(touchDragTimer); touchDragTimer = null; }
        touchStartData = null;
        if (touchGhost) { touchGhost.remove(); touchGhost = null; }
        document.querySelectorAll('.dragging, .drag-over, .drag-over-zone')
          .forEach(n => n.classList.remove('dragging', 'drag-over', 'drag-over-zone'));
        touchDrag = null;
      });

      // --- Keyboard Shortcuts ---
      document.addEventListener('keydown', e => {
        const tag = document.activeElement?.tagName;
        const isInput = tag === 'INPUT' || tag === 'TEXTAREA';
        if (isInput) return;

        const isMac = navigator.platform.startsWith('Mac');
        const mod = isMac ? e.metaKey : e.ctrlKey;

        if (mod && !e.shiftKey && e.key === 'z') { e.preventDefault(); undo(); }
        if (mod && e.key === 'y') { e.preventDefault(); redo(); }
        if (mod && e.shiftKey && e.key === 'z') { e.preventDefault(); redo(); }
      });
    }

    async function handleImportParam() {
      if (!FIREBASE_CONFIG.projectId) return;
      const docId = new URLSearchParams(location.search).get('import');
      if (!docId) return;
      history.replaceState({}, '', location.pathname);
      if (!confirm('偵測到分享連結，是否匯入該行程？（將覆蓋目前行程）')) return;
      try {
        const data = await getSharedTripData(docId);
        setActiveTrip(migrateState(data));
        if (!state.days?.find(d => d.id === state.activeDayId)) {
          state.activeDayId = state.days?.[0]?.id ?? null;
        }
        save();
        saveImportedDocId(docId);
        shareState.importedDocId = docId;
        render();
      } catch (err) {
        alert('匯入失敗：' + (err.message || '未知錯誤'));
      }
    }

    init();
  </script>
</body>
</html>
